name: AndrewDictate
options:
  bundleIdPrefix: gg.jass
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.15.5

targets:
  AndrewDictate:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Resources
      - path: Sources/Resources/Sounds/dictation-start.wav
        buildPhase: resources
      - path: Sources/Resources/Sounds/dictation-end.wav
        buildPhase: resources
      - path: Sources/Resources/Sounds/command-start.wav
        buildPhase: resources
      - path: Sources/Resources/Sounds/command-end.wav
        buildPhase: resources
    dependencies:
      - package: FluidAudio
    settings:
      base:
        PRODUCT_NAME: Andrew Dictate
        PRODUCT_MODULE_NAME: AndrewDictate
        PRODUCT_BUNDLE_IDENTIFIER: gg.jass.dictate
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Andrew Dictate
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "2"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: "andrew dictate uses your microphone for local dictation. with pre-roll on, the mic stays warm while the app runs."

  AndrewDictateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Sources/Cleanup
      - Sources/Audio/RingSplicer.swift
      - Sources/HUD/BrandLineMath.swift
      - Sources/HUD/HUDLayoutEngine.swift
      - Sources/Settings/AppSettings.swift
      - Sources/Settings/AgentCLIDetector.swift
      - Sources/Onboarding/OnboardingState.swift
      - Sources/Hotkey/HotkeyBinding.swift
      - Sources/Hotkey/TapLockDetector.swift
      - Sources/Command/CommandRouter.swift
      - Sources/Command/AppMatcher.swift
      - Sources/Command/AgentDelegator.swift
      - Sources/Command/AskEngine.swift
      - Sources/Command/DelegationGate.swift
      - Sources/Insertion/FocusAnchor.swift
      - Sources/Instrumentation/UtteranceTimeline.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  AndrewDictate:
    build:
      targets:
        AndrewDictate: all
        AndrewDictateTests:
          - test
    test:
      config: Debug
      targets:
        - AndrewDictateTests
