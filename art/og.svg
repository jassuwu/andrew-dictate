<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- andrew dictate — og image -->
  <rect width="1200" height="630" fill="#1B1B1F"/>
  <g transform="translate(80 60) scale(1.0)">
<!-- head: shaved dome, temple width, tapered jaw -->
  <path d="M158 212
           C 158 148, 194 118, 255 118
           C 316 118, 352 148, 352 212
           L 352 260
           C 352 324, 320 358, 255 358
           C 190 358, 158 324, 158 260
           Z" fill="#EFEAE0"/>

  <!-- beard: sideburns at the head edge, cheek fade, mustache bump, flush jaw -->
  <path d="M162 248
           C 172 284, 190 298, 214 300
           C 232 301, 246 294, 255 292
           C 264 294, 278 301, 296 300
           C 320 298, 338 284, 348 248
           L 352 260
           C 352 324, 320 358, 255 358
           C 190 358, 158 324, 158 260
           Z" fill="#2B2521"/>

  <!-- shades: heavy brow bar, slanted sport lenses -->
  <rect x="144" y="192" width="224" height="16" rx="8" fill="#0B0B0E"/>
  <g fill="#0B0B0E">
    <path d="M166 208 L 246 208 L 242 246 Q 240 258 226 258 L 186 258 Q 170 258 168 244 Z"/>
    <path d="M266 208 L 346 208 L 344 244 Q 342 258 326 258 L 286 258 Q 272 258 270 246 Z"/>
  </g>

  <!-- cigar: slim, tilted, banded, lit -->
  <g transform="rotate(-10 316 310)">
    <rect x="298" y="300" width="134" height="20" rx="10" fill="#6E4226"/>
    <rect x="346" y="300" width="12" height="20" fill="#E4593B" opacity="0.9"/>
    <rect x="418" y="301" width="13" height="18" rx="6" fill="#E4593B"/>
    <rect x="428" y="303" width="4" height="14" rx="2" fill="#F0805F"/>
  </g>

  <!-- the smoke is the waveform: bars drift upward as they rise -->
  <g fill="#EFEAE0">
    <rect x="392" y="222" width="12" height="40"  rx="6"/>
    <rect x="414" y="176" width="12" height="74"  rx="6" fill="#E4593B"/>
    <rect x="436" y="128" width="12" height="110" rx="6"/>
    <rect x="458" y="170" width="12" height="58"  rx="6"/>
  </g>
  </g>
  <text x="620" y="300" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="600" letter-spacing="-2" fill="#EFEAE0">andrew dictate</text>
  <text x="624" y="368" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="38" fill="#E4593B">escape the keyboard.</text>
  <text x="624" y="540" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="26" fill="#EFEAE0" fill-opacity="0.55">free · open source · fully local</text>
</svg>
