<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0C0C0E"/>
  <g transform="translate(80 85) scale(0.9)">

  <!-- andrew dictate — THE logo. black & gold: the voice IS the mic. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E9A8"/>
      <stop offset="45%" stop-color="#E5BE62"/>
      <stop offset="100%" stop-color="#9E7527"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6C9"/>
      <stop offset="100%" stop-color="#D9AE52"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- gold rim -->
  <rect x="10" y="10" width="492" height="492" rx="108" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <rect x="26" y="26" width="460" height="460" rx="96" fill="none" stroke="url(#goldHi)" stroke-width="2" opacity="0.4"/>

  <!-- skull outline: wide bald dome, open jaw (the mic completes the face) -->
  <path d="M 162 330
           C 150 210, 176 118, 256 118
           C 336 118, 362 210, 350 330"
        fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>

  <!-- aviators: contained within the face -->
  <line x1="184" y1="208" x2="328" y2="208" stroke="url(#goldHi)" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="222" cy="232" rx="36" ry="26" fill="#0B0B0D" stroke="url(#goldHi)" stroke-width="6"/>
  <ellipse cx="290" cy="232" rx="36" ry="26" fill="#0B0B0D" stroke="url(#goldHi)" stroke-width="6"/>
  <path d="M 246 222 C 251 215, 261 215, 266 222" fill="none" stroke="url(#goldHi)" stroke-width="6" stroke-linecap="round"/>
  <!-- star glint -->
  <line x1="186" y1="230" x2="160" y2="228" stroke="url(#goldHi)" stroke-width="6" stroke-linecap="round"/>
  <line x1="326" y1="230" x2="352" y2="228" stroke="url(#goldHi)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 298 220 L 302 229 L 312 232 L 302 235 L 298 244 L 294 235 L 284 232 L 294 229 Z" fill="#FFF6C9"/>

  <!-- ears -->
  <rect x="140" y="238" width="15" height="42" rx="7.5" fill="url(#gold)"/>
  <rect x="357" y="238" width="15" height="42" rx="7.5" fill="url(#gold)"/>

  <!-- the mic is the jaw -->
  <rect x="196" y="260" width="120" height="120" rx="54" fill="url(#gold)"/>
  <g fill="#0B0B0D">
    <rect x="215" y="290" width="12" height="84" rx="6"/>
    <rect x="238" y="290" width="12" height="84" rx="6"/>
    <rect x="261" y="290" width="12" height="84" rx="6"/>
    <rect x="284" y="290" width="12" height="84" rx="6"/>
  </g>
  <!-- cradle + stem + foot -->
  <path d="M 182 330 C 178 396, 226 422, 256 422 C 286 422, 334 396, 330 330"
        fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
  <rect x="248" y="422" width="16" height="24" rx="7" fill="url(#gold)"/>
  <path d="M 210 460 L 302 460 C 302 442, 280 434, 256 434 C 232 434, 210 442, 210 460 Z" fill="url(#gold)"/>

  <!-- flanking soundwaves -->
  <g fill="url(#gold)">
    <rect x="42"  y="251" width="10" height="22" rx="5"/>
    <rect x="59"  y="242" width="10" height="40" rx="5"/>
    <rect x="76"  y="231" width="10" height="62" rx="5"/>
    <rect x="93" y="218" width="10" height="88" rx="5"/>
    <rect x="110" y="231" width="10" height="62" rx="5"/>
    <rect x="127" y="242" width="10" height="40" rx="5"/>
  </g>
  <g fill="url(#gold)">
    <rect x="375" y="242" width="10" height="40" rx="5"/>
    <rect x="392" y="231" width="10" height="62" rx="5"/>
    <rect x="409" y="218" width="10" height="88" rx="5"/>
    <rect x="426" y="231" width="10" height="62" rx="5"/>
    <rect x="443" y="242" width="10" height="40" rx="5"/>
    <rect x="460" y="251" width="10" height="22" rx="5"/>
  </g>

  </g>
  <text x="600" y="300" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="600" letter-spacing="-2" fill="#F9E9A8">andrew dictate</text>
  <text x="604" y="368" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="38" fill="#E5BE62">escape the keyboard.</text>
  <text x="604" y="540" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="26" fill="#F9E9A8" fill-opacity="0.5">free · open source · fully local</text>
</svg>
