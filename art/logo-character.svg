<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- andrew dictate — THE logo. faceted, sharp, lit. the smoke is the waveform. -->
  <rect width="512" height="512" rx="116" fill="#1B1B1F"/>

  <!-- head: faceted skull, chiseled jaw, flat chin -->
  <path d="M 196 128
           L 256 120
           L 316 128
           L 338 148
           L 346 198
           L 338 272
           L 302 344
           L 280 356
           L 232 356
           L 210 344
           L 174 272
           L 166 198
           L 174 148
           Z" fill="#EFEAE0"/>

  <!-- beard: angular block, high cheek points, mustache line -->
  <path d="M 178 256
           L 224 284
           L 256 292
           L 288 284
           L 334 256
           L 338 272
           L 302 344
           L 280 356
           L 232 356
           L 210 344
           L 174 272
           Z" fill="#2B2521"/>

  <!-- shades: wraparound browline (overhangs the skull) + outward-slanted lenses -->
  <path d="M 156 186 L 356 186 L 356 202 L 156 202 Z" fill="#0B0B0E"/>
  <path d="M 178 202 L 244 202 L 238 246 L 188 242 Z" fill="#0B0B0E"/>
  <path d="M 268 202 L 334 202 L 324 242 L 274 246 Z" fill="#0B0B0E"/>

  <!-- cigar: from the beard line, tilted up -->
  <g transform="rotate(-12 306 306)">
    <rect x="298" y="296" width="126" height="20" rx="4" fill="#6E4226"/>
    <rect x="334" y="296" width="12" height="20" fill="#E4593B" opacity="0.9"/>
    <rect x="412" y="297" width="12" height="18" rx="3" fill="#E4593B"/>
    <rect x="421" y="299" width="4" height="14" rx="2" fill="#F0805F"/>
  </g>

  <!-- the smoke is the waveform -->
  <g fill="#EFEAE0">
    <rect x="390" y="216" width="13" height="42"  rx="4"/>
    <rect x="413" y="170" width="13" height="76"  rx="4" fill="#E4593B"/>
    <rect x="436" y="122" width="13" height="112" rx="4"/>
    <rect x="459" y="164" width="13" height="60"  rx="4"/>
  </g>
</svg>
