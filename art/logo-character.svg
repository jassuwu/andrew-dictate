<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- andrew dictate — character mark. brand-play surfaces only (ADR 0013). -->
  <rect width="512" height="512" rx="116" fill="#1B1B1F"/>
  <!-- bald head, long jaw -->
  <rect x="170" y="136" width="164" height="230" rx="64" fill="#EFEAE0"/>
  <!-- wraparound shades, slight overhang -->
  <rect x="150" y="212" width="204" height="52" rx="26" fill="#0E0E11"/>
  <rect x="150" y="212" width="204" height="52" rx="26" fill="none" stroke="#EFEAE0" stroke-opacity="0.22" stroke-width="3"/>
  <!-- cigar from the mouth corner, tilted up -->
  <g transform="rotate(-14 300 330)">
    <rect x="296" y="318" width="112" height="25" rx="12" fill="#6E4226"/>
    <rect x="330" y="318" width="13" height="25" fill="#E4593B" opacity="0.85"/>
    <rect x="396" y="320" width="12" height="21" rx="6" fill="#E4593B"/>
  </g>
  <!-- the smoke is the waveform -->
  <g fill="#EFEAE0">
    <rect x="394" y="224" width="14" height="44"  rx="7"/>
    <rect x="418" y="188" width="14" height="80"  rx="7" fill="#E4593B"/>
    <rect x="442" y="152" width="14" height="116" rx="7"/>
    <rect x="466" y="206" width="14" height="62"  rx="7"/>
  </g>
</svg>
