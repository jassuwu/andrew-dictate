<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">
  <!-- andrew dictate — wordmark lockup: the character + name + tagline. -->
  <rect width="960" height="300" rx="28" fill="#1B1B1F"/>
  <g transform="translate(38 22) scale(0.5)">
<!-- cigar: fat body → band → ash → ember, rising at a confident angle -->
  <g transform="rotate(-20 215 326)">
    <rect x="100" y="302" width="200" height="46" rx="23" fill="#6E4226"/>
    <rect x="156" y="302" width="20" height="46" fill="#E4593B"/>
    <rect x="300" y="302" width="26" height="46" fill="#D8D2C4"/>
    <rect x="326" y="302" width="18" height="46" rx="9" fill="#E4593B"/>
    <rect x="337" y="311" width="6" height="28" rx="3" fill="#F0805F"/>
  </g>

  <!-- the smoke is the waveform, drifting up from the ember -->
  <g fill="#EFEAE0">
    <rect x="332" y="210" width="15" height="64"  rx="7.5"/>
    <rect x="357" y="142" width="15" height="116" rx="7.5" fill="#E4593B"/>
    <rect x="382" y="82"  width="15" height="160" rx="7.5"/>
    <rect x="407" y="134" width="15" height="94"  rx="7.5"/>
    <rect x="432" y="164" width="15" height="52"  rx="7.5"/>
  </g>
  </g>
  <text x="308" y="158" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="600" letter-spacing="-1.5" fill="#EFEAE0">andrew dictate</text>
  <text x="311" y="214" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" fill="#E4593B">escape the keyboard.</text>
</svg>
